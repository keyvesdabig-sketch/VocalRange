<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalRange – Vocal Range Analyzer</title>

    <!-- PWA & Mobile -->
    <link rel="manifest" href="manifest.json">
    <!-- theme-color: read at parse time; IDE warning is a known harmless false positive. -->
    <meta name="theme-color" content="#160625">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="favicon.svg">

    <!-- SEO -->
    <meta name="description" content="Find your voice type in seconds. Sing into your microphone — VocalRange analyzes your vocal range using the YIN pitch detection algorithm.">
    <meta property="og:title" content="VocalRange – Vocal Range Analyzer">
    <meta property="og:description" content="Discover whether you're a Soprano, Alto, Tenor, Baritone or Bass. Real-time pitch trail. No account needed.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">

    <!-- Fonts: Space Grotesk (display) + Manrope (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Design System -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Static organic background blobs (Vocal Luminescence) -->
    <div class="bg-blob bg-blob--violet"></div>
    <div class="bg-blob bg-blob--cyan"></div>
    <div class="bg-blob bg-blob--deep"></div>

    <!-- Page content — filled by js/app.js router -->
    <main id="app"></main>

    <!-- Bottom Navigation -->
    <nav id="bottomNav" aria-label="Main navigation">

        <button class="nav-tab active" data-nav="studio" aria-label="Studio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="2" width="6" height="11" rx="3"/>
                <path d="M5 10a7 7 0 0 0 14 0"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
                <line x1="9"  y1="22" x2="15" y2="22"/>
            </svg>
            Studio
        </button>

        <button class="nav-tab" data-nav="vitals" aria-label="Vitals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" aria-hidden="true">
                <rect x="3"  y="12" width="4" height="9"/>
                <rect x="10" y="7"  width="4" height="14"/>
                <rect x="17" y="3"  width="4" height="18"/>
            </svg>
            Vitals
        </button>

        <button class="nav-tab" data-nav="arena" aria-label="Arena">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M8 21h8M12 17v4"/>
                <path d="M17 3H7v6a5 5 0 0 0 10 0V3z"/>
                <path d="M17 5h3a1 1 0 0 1 1 1v1a4 4 0 0 1-4 4h-.5"/>
                <path d="M7  5H4a1 1 0 0 0-1 1v1a4 4 0 0 0 4 4h.5"/>
            </svg>
            Arena
        </button>

        <button class="nav-tab" data-nav="profile" aria-label="Profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" aria-hidden="true">
                <circle cx="12" cy="7" r="4"/>
                <path d="M5 21a7 7 0 0 1 14 0"/>
            </svg>
            Profile
        </button>

    </nav>

    <!-- App router + pages -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
